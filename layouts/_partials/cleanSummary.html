{{ $max := site.Params.summaryMaxLength | default 300 }}
{{ $s := .Summary | replaceRE "<img[^>]*>" "" | replaceRE "(?s)<table[^>]*>.*?</table>" "" }}
{{ if gt (len $s) $max }}
  {{ $s = substr $s 0 $max }}
  {{ $s = printf "%s…" (strings.TrimRight " .,;:!?" $s) }}
{{ end }}
{{ return ($s | safeHTML) }}

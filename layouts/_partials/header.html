<button id="hamburger" aria-label="Menu">☰</button>
<a href="/" class="site-title">
  <div style="display: flex; align-items: center;">
    {{ $image := resources.GetMatch "images/logo.png" }}
    {{ $mask := images.Mask (resources.Get "images/circle_mask.png") }}
    {{ with $image | images.Filter $mask}}
    <img src="{{ .RelPermalink }}" width="100" height="100" style="margin:8px;">
    {{ end }}
    {{ site.Title }}
  </div>
</a>

<!DOCTYPE html>
<html lang="{{ site.Language.Locale }}" dir="{{ or site.Language.Direction `ltr` }}">
<head>
  {{ partial "head/head.html" . }}
</head>
<body>
  <div id="page-wrapper">
    <header class="header">
      {{ partial "header.html" . }}
    </header>
    <main class="main">
      {{ block "main" . }}{{ end }}
    </main>
    <footer class="footer">
      {{ partial "footer.html" . }}
    </footer>
  </div>
  {{ partial "drawer.html" . }}
</body>
</html>

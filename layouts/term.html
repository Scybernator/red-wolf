{{ define "main" }}
<div class="term">
  <nav class="nav">
    {{ partial "tagcloud.html" . }}
  </nav>
  <div class="posts">
    <h1>{{ .Title }}</h1>
    {{ .Content }}
    {{ $paginator := .Paginate (sort .Pages "Date" "desc") }}
    {{ range $paginator.Pages }}
      {{ partial "pageCard.html" (dict "page" . "featured" false) }}
    {{ end }}
    {{ partial "pagination.html" $paginator }}
  </div>
  <div class="aside"></div>
</div>
{{ end }}
